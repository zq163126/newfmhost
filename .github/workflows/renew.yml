name: Auto Renew Server

on:
 # schedule:
    # 每天的 HKT (香港时间) 早上 08:00 自动运行 (对应 UTC 00:00)
   # - cron: '0 0 * * *'
  workflow_dispatch: # 允许在 GitHub 页面上手动点击运行

jobs:
  renew:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Browsers
      run: |
        # 仅安装必要的 chromium 浏览器及其系统级依赖
        playwright install chromium --with-deps

    - name: 启用 WARP 网络
      uses: fscarmen/warp-on-actions@v1.3
      with:
          stack: dual
          mode: client

    - name: 修复 DNS
      run: |
          echo "[INFO] 停用 systemd-resolved，设置公共 DNS..."
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true

          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf

          sleep 2

          echo "[INFO] DNS 测试:"
          nslookup new.freemchost.com 1.1.1.1 || echo "[WARN] 解析失败"

          echo ""
          echo "[INFO] 当前出口 IP:"
          curl -s --max-time 10 https://api.ipify.org && echo
          echo "[INFO] WARP Trace:"
          curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'ip=|warp=|loc=' || true

    - name: Run Auto Renew Script
      env:
        WEB_EMAIL: ${{ secrets.WEB_EMAIL }}
        WEB_PASSWORD: ${{ secrets.WEB_PASSWORD }}
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: |
        python main.py
